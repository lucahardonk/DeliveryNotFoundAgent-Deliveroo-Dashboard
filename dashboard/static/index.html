<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>DeliveryNotFound — Agent Dashboard</title>
  <style>
    :root { color-scheme: dark; }
    * { box-sizing: border-box; }
    body {
      margin: 0; font-family: system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
      background: #0f1216; color: #e6e9ef;
    }
    header {
      padding: 18px 24px; border-bottom: 1px solid #232833;
      display: flex; align-items: baseline; gap: 12px;
    }
    h1 { font-size: 18px; margin: 0; }
    .meta { color: #7d8798; font-size: 13px; }
    main { padding: 20px 24px; }
    table { width: 100%; border-collapse: collapse; font-size: 14px; }
    th, td { text-align: left; padding: 10px 12px; border-bottom: 1px solid #1c212b; }
    th { color: #8b95a7; font-weight: 600; font-size: 12px; text-transform: uppercase; letter-spacing: .04em; }
    tr:hover td { background: #151a22; }
    .badge {
      display: inline-block; padding: 2px 9px; border-radius: 999px;
      font-size: 12px; font-weight: 600;
    }
    .type-bt { background: #16324a; color: #74c0fc; }
    .type-bdi { background: #3a2a4d; color: #cc9ff0; }
    .status-running { color: #63e6be; }
    .status-connecting, .status-starting { color: #ffd43b; }
    .status-error { color: #ff8787; }
    .stale td { opacity: .45; }
    .empty { color: #7d8798; padding: 40px; text-align: center; }
    code { color: #9ec5fe; }
  </style>
</head>
<body>
  <header>
    <h1>🛵 DeliveryNotFound — Agent Dashboard</h1>
    <span class="meta" id="meta">connecting…</span>
  </header>
  <main>
    <table id="agents-table" hidden>
      <thead>
        <tr>
          <th>Agent ID</th>
          <th>Type</th>
          <th>Status</th>
          <th>Current action</th>
          <th>Pos</th>
          <th>Score</th>
          <th>Carrying</th>
          <th>Last update</th>
        </tr>
      </thead>
      <tbody id="agents-body"></tbody>
    </table>
    <div class="empty" id="empty">No agents reporting yet. Start them with <code>python main.py</code>.</div>
  </main>

  <script>
    const POLL_MS = 2000;

    function statusClass(status) {
      if (!status) return "";
      if (status.startsWith("running")) return "status-running";
      if (status.startsWith("error")) return "status-error";
      return "status-connecting";
    }

    function ago(ts, now) {
      if (!ts) return "—";
      const s = Math.max(0, Math.round(now - ts));
      if (s < 60) return s + "s ago";
      return Math.round(s / 60) + "m ago";
    }

    async function poll() {
      try {
        const res = await fetch("/api/agents");
        const data = await res.json();
        render(data.agents || [], data.now || (Date.now() / 1000));
      } catch (e) {
        document.getElementById("meta").textContent = "dashboard unreachable…";
      }
    }

    function render(agents, now) {
      const body = document.getElementById("agents-body");
      const table = document.getElementById("agents-table");
      const empty = document.getElementById("empty");
      const meta = document.getElementById("meta");

      agents.sort((a, b) => String(a.agent_id).localeCompare(String(b.agent_id)));

      meta.textContent = agents.length + " agent(s) • updated " +
        new Date(now * 1000).toLocaleTimeString();

      if (agents.length === 0) {
        table.hidden = true; empty.hidden = false; return;
      }
      table.hidden = false; empty.hidden = true;

      body.innerHTML = agents.map(a => {
        const stale = (now - (a.last_update || 0)) > 10;
        const pos = (a.x ?? "—") + "," + (a.y ?? "—");
        return `<tr class="${stale ? "stale" : ""}">
          <td><strong>${a.agent_id ?? "—"}</strong></td>
          <td><span class="badge type-${a.agent_type || "bt"}">${(a.agent_type || "?").toUpperCase()}</span></td>
          <td class="${statusClass(a.status)}">${a.status ?? "—"}</td>
          <td>${a.current_action ?? "—"}</td>
          <td>${pos}</td>
          <td>${a.score ?? "—"}</td>
          <td>${a.carrying ?? 0}</td>
          <td>${ago(a.last_update, now)}</td>
        </tr>`;
      }).join("");
    }

    poll();
    setInterval(poll, POLL_MS);
  </script>
</body>
</html>
