<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Deliveroo Agents — Dashboard</title>
<style>
  :root {
    --bg:      #0f1117;
    --surface: #1a1d27;
    --border:  #2a2e3a;
    --txt:     #e6e8ef;
    --muted:   #8b90a0;
    --accent:  #00c48c;
    --danger:  #f87171;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { display: flex; flex-direction: column; height: 100vh;
         font-family: system-ui, -apple-system, sans-serif;
         background: var(--bg); color: var(--txt); }

  /* ── Header ── */
  header {
    display: flex; align-items: center; gap: 10px;
    padding: 12px 20px; border-bottom: 1px solid var(--border);
    flex-shrink: 0;
  }
  header h1 { font-size: 16px; font-weight: 600; }
  header .sub { font-size: 12px; color: var(--muted); }
  #conn-badge {
    margin-left: auto; font-size: 12px; padding: 3px 10px;
    border-radius: 999px; background: #f8717133; color: var(--danger);
    transition: all .3s;
  }
  #conn-badge.ok { background: #00c48c22; color: var(--accent); }

  /* ── Layout ── */
  .body { display: flex; flex: 1; overflow: hidden; }

  /* ── Sidebar ── */
  aside {
    width: 200px; flex-shrink: 0;
    border-right: 1px solid var(--border);
    overflow-y: auto; padding: 12px 8px;
  }
  aside h2 { font-size: 10px; font-weight: 700; letter-spacing: .08em;
              text-transform: uppercase; color: var(--muted);
              padding: 0 8px; margin-bottom: 8px; }
  .agent-btn {
    display: flex; align-items: center; gap: 8px;
    width: 100%; background: none; border: none; border-radius: 7px;
    padding: 8px 10px; cursor: pointer; color: var(--muted);
    font-size: 13px; font-weight: 500; text-align: left;
    transition: background .15s, color .15s;
  }
  .agent-btn:hover  { background: var(--surface); color: var(--txt); }
  .agent-btn.active { background: #00c48c18; color: var(--accent); }
  .dot {
    width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0;
    background: var(--muted);
  }
  .dot.live { background: var(--accent); box-shadow: 0 0 5px var(--accent); }
  #no-agents { font-size: 12px; color: var(--muted); padding: 8px 10px; }

  /* ── Main panel ── */
  main { flex: 1; overflow: auto; padding: 20px 24px; }
  #panel-header {
    font-size: 13px; color: var(--muted);
    margin-bottom: 14px; min-height: 20px;
  }
  #panel-header strong { color: var(--txt); }
  #panel-header .tag  { color: var(--accent); font-size: 11px; margin-left: 6px; }

  pre {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 10px; padding: 18px 20px;
    font-size: 13px; line-height: 1.6; overflow: auto;
    white-space: pre-wrap; word-break: break-word;
    color: var(--txt);
  }
  #empty-state {
    display: flex; align-items: center; justify-content: center;
    height: 60%; color: var(--muted); font-size: 14px;
  }

  /* JSON colour coding */
  .jk  { color: #93c5fd; } /* key     */
  .js  { color: #86efac; } /* string  */
  .jn  { color: #fcd34d; } /* number  */
  .jb  { color: #f9a8d4; } /* boolean */
  .jnu { color: var(--muted); } /* null   */
</style>
</head>
<body>

<header>
  <span>🛵</span>
  <h1>Deliveroo Agents</h1>
  <span class="sub">live dashboard</span>
  <span id="conn-badge">disconnected</span>
</header>

<div class="body">
  <aside>
    <h2>Agents</h2>
    <div id="agent-list"><div id="no-agents">no agents yet…</div></div>
  </aside>
  <main>
    <div id="panel-header"></div>
    <div id="empty-state">← select an agent</div>
    <pre id="snapshot" style="display:none"></pre>
  </main>
</div>

<script>
  // ── Config ────────────────────────────────────────────────────────────────
  const SSE_URL = '/api/stream';   // adjust if dashboard runs on a different origin

  // ── State ─────────────────────────────────────────────────────────────────
  let agents     = {};   // id -> snapshot
  let selectedId = null;

  // ── SSE connection ────────────────────────────────────────────────────────
  function connect() {
    const es = new EventSource(SSE_URL);

    es.addEventListener('agents', (e) => {
      agents = JSON.parse(e.data);
      renderSidebar();
      if (selectedId) renderPanel(selectedId);
    });

    es.onopen  = () => badge(true);
    es.onerror = () => {
      badge(false);
      es.close();
      setTimeout(connect, 3000);   // auto-reconnect
    };
  }

  function badge(ok) {
    const el = document.getElementById('conn-badge');
    el.textContent = ok ? 'live' : 'reconnecting…';
    el.className   = ok ? 'ok'  : '';
  }

  // ── Sidebar ───────────────────────────────────────────────────────────────
  function renderSidebar() {
    const list = document.getElementById('agent-list');
    const ids  = Object.keys(agents);

    if (!ids.length) {
      list.innerHTML = '<div id="no-agents">no agents yet…</div>';
      return;
    }

    list.innerHTML = ids.map((id) => {
      const snap  = agents[id];
      const label = snap.label ?? snap.id ?? id;
      const live  = (Date.now() - (snap.receivedAt ?? 0)) < 5000;
      const cls   = (id === selectedId ? 'agent-btn active' : 'agent-btn');
      return `<button class="${cls}" onclick="selectAgent('${id}')">
                <span class="dot ${live ? 'live' : ''}"></span>${label}
              </button>`;
    }).join('');

    // Auto-select first agent if none selected yet.
    if (!selectedId || !agents[selectedId]) selectAgent(ids[0], false);
  }

  // ── Panel ─────────────────────────────────────────────────────────────────
  function selectAgent(id, rerender = true) {
    selectedId = id;
    if (rerender) renderSidebar();
    renderPanel(id);
  }

  function renderPanel(id) {
    const snap = agents[id];
    if (!snap) return;

    const label = snap.label ?? snap.id ?? id;
    document.getElementById('panel-header').innerHTML =
      `Latest snapshot for <strong>${label}</strong><span class="tag">(auto-updates)</span>`;

    document.getElementById('empty-state').style.display  = 'none';
    const pre = document.getElementById('snapshot');
    pre.style.display = 'block';
    pre.innerHTML = highlight(JSON.stringify(snap, null, 2));
  }

  // ── JSON syntax highlight ─────────────────────────────────────────────────
  function highlight(json) {
    return json
      .replace(/&/g, '&').replace(/</g, '<').replace(/>/g, '>')
      .replace(/("(\\u[a-zA-Z0-9]{4}|\\[^u]|[^\\"])*")(\s*:)?/g, (m, _s, _u, colon) =>
        colon
          ? `<span class="jk">${m.slice(0,-1)}</span>:`
          : `<span class="js">${m}</span>`)
      .replace(/\b(-?\d+\.?\d*([eE][+-]?\d+)?)\b/g, '<span class="jn">$1</span>')
      .replace(/\b(true|false)\b/g, '<span class="jb">$1</span>')
      .replace(/\bnull\b/g,          '<span class="jnu">null</span>');
  }

  // ── Boot ──────────────────────────────────────────────────────────────────
  connect();
</script>
</body>
</html>
